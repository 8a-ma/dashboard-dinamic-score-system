version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: '%(asctime)s [%(levelname)s] - %(name)s.%(funcName)s (%(process)s)  %(message)s'
    datefmt: '%Y-%m-%dT%H:%M:%SZ'
    encoding: 'utf-8'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

loggers:
  root:
    level: DEBUG
    handlers: [console]